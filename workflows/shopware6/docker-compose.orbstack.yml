services:
  web:
    image: ${SW_PHP_IMAGE}
    working_dir: /var/www/html
    environment:
      APP_URL: ${SW_APP_URL}
      APP_ENV: ${SW_APP_ENV:-dev}
      DATABASE_URL: mysql://${SW_DB_ROOT_USER}:${SW_DB_ROOT_PASSWORD}@${SW_DB_HOST}:${SW_DB_PORT}/${SW_DB_NAME}
      REDIS_URL: ${SW_REDIS_URL}
      MAILER_DSN: ${SW_MAILER_DSN}
      OPENSEARCH_URL: ${SW_OPENSEARCH_URL:-}
      ADMIN_OPENSEARCH_URL: ${SW_OPENSEARCH_URL:-}
      COMPOSER_ROOT_VERSION: ${SW_COMPOSER_ROOT_VERSION}
      HOST: "0.0.0.0"
      WORKTREE_ID: ${SW_WORKTREE_ID}
      SWCTL_PROJECT: ${SW_PROJECT}
      SWCTL_ISSUE: ${SW_ISSUE}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - project
    volumes:
      - ${SW_WORKTREE_PATH}:/var/www/html:cached
      # Docker volume overlays for vendor + admin/storefront node_modules are
      # appended by write_compose_volume_override in swctl — it decides per
      # instance whether to mount the shared base (ro, fast) or a dedicated
      # volume (rw, populated from base cache). Keeping them out of this base
      # template lets the override vary RO/RW without compose-merge clashes.
    labels:
      - "swctl.managed=true"
      - "swctl.project=${SW_PROJECT_SLUG}"
      - "swctl.issue=${SW_ISSUE}"
      - "dev.orbstack.domains=${SW_APP_DOMAIN}"

networks:
  project:
    external: true
    name: ${SW_PROJECT_NETWORK:-trunk_default}
