name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate bash syntax
        run: bash -n swctl

      - name: ShellCheck
        run: shellcheck swctl

      - name: Validate workflow hooks
        run: |
          for hook in workflows/shopware6/hooks/*.sh; do
            bash -n "$hook"
          done

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install BATS
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats
          sudo /tmp/bats/install.sh /usr/local

      - name: Run unit tests
        run: bats tests/*.bats

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install BATS
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats
          sudo /tmp/bats/install.sh /usr/local

      # ubuntu-latest runners ship Docker — verify it's actually up before
      # running the suite so a flaky daemon produces a clear failure
      # instead of the tests silently `skip`'ing.
      - name: Verify docker is available
        run: |
          docker version
          docker info >/dev/null

      - name: Pre-pull alpine image
        # Every integration test spawns throwaway alpine containers; pulling
        # once up-front keeps per-test timing stable and surfaces network
        # issues early.
        run: docker pull alpine:latest

      - name: Install app dependencies (for ai_scope.bats)
        # tests/integration/ai_scope.bats drives `detectScopeWithAI` via
        # a tsx-executed probe harness.  Without tsx the tests `skip`
        # themselves (safe, no failure) but CI then provides no
        # regression coverage for the AI-scope module.  `tsx` lives in
        # devDependencies, so plain `npm ci` (no --omit) is what we want.
        run: |
          cd app
          npm ci --no-audit --no-fund

      - name: Run integration tests
        run: bats tests/integration/*.bats

      - name: Cleanup leftover test resources
        if: always()
        # Defensive — every test has a teardown, but if bats crashes mid-test
        # the leftovers would accumulate across runs on self-hosted runners.
        # No-op on GitHub-hosted runners (ephemeral VMs).
        run: |
          LEFT=$(docker ps -aq --filter 'name=swctl-it-' 2>/dev/null | tr '\n' ' ')
          [ -n "$LEFT" ] && docker rm -f $LEFT || true
          docker network ls --format '{{.Name}}' | grep '^swctl-it-' | xargs -r -I{} docker network rm {} || true
          docker volume ls --format '{{.Name}}' | grep '^swctl-it-' | xargs -r -I{} docker volume rm {} || true
